services:
  nginx:
    image: nginx:alpine
    container_name: nginx-test
    ports:
      - "8080:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
    restart: unless-stopped

  nginx-secondary:
    image: nginx:alpine
    container_name: nginx-secondary
    ports:
      - "8081:80"
    restart: unless-stopped
